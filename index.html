<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 우리의 할 일</title>

<style>
body {
    font-family: Arial;
    background: #ffeef2;
    padding: 30px;
}

h1 {
    text-align: center;
    color: #ff4d6d;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
}

input[type="date"], input[type="time"] {
    font-size: 18px;
}

button {
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #ff1f4b;
}

.todo {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    color: white;
    position: relative;
}

.delete {
    position: absolute;
    right: 10px;
    top: 10px;
    background: white;
    color: black;
    border: none;
    padding: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>💖 우리의 할 일 💖</h1>

<div class="box">
    <input type="date" id="date">
    <input type="time" id="time">
    <input type="text" id="task" placeholder="할 일을 입력하세요">
    
    🎨 색상 선택:
    <input type="color" id="color" value="#ff4d6d">
    
    <button onclick="addTodo()">추가</button>

    <div id="list"></div>
</div>

<script>
let todos = JSON.parse(localStorage.getItem("todos")) || [];

function save() {
    localStorage.setItem("todos", JSON.stringify(todos));
}

function addTodo() {
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;
    let task = document.getElementById("task").value;
    let color = document.getElementById("color").value;

    if (!date || !task) {
        alert("날짜와 할 일을 입력하세요!");
        return;
    }

    todos.push({ date, time, task, color });
    save();
    render();

    document.getElementById("task").value = "";
}

function deleteTodo(index) {
    todos.splice(index, 1);
    save();
    render();
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    todos.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

    todos.forEach((todo, i) => {
        list.innerHTML += `
            <div class="todo" style="background:${todo.color}">
                <b>${todo.date} ${todo.time || ""}</b><br>
                ${todo.task}
                <button class="delete" onclick="deleteTodo(${i})">X</button>
            </div>
        `;
    });
}

render();
</script>

</body>
</html>
