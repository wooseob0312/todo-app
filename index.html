<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 우리의 일정 💖</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #f9f9fb;
}

.container {
    display: flex;
    height: 100vh;
}

/* 왼쪽 캘린더 */
.left {
    width: 50%;
    background: white;
    border-right: 1px solid #eee;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    font-weight: bold;
}

.nav {
    cursor: pointer;
    font-size: 20px;
}

/* 캘린더 */
.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-top: 15px;
}

.day {
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
}

.day:hover {
    background: #eee;
}

.today {
    background: #ff4d6d;
    color: white;
}

.selected {
    border: 2px solid #ff4d6d;
}

/* 일정 점 */
.dot {
    width: 5px;
    height: 5px;
    background: #ff4d6d;
    border-radius: 50%;
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
}

/* 오른쪽 */
.right {
    width: 50%;
    padding: 30px;
}

h1 {
    text-align: center;
    color: #ff4d6d;
}

/* 입력 */
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: #ff4d6d;
    color: white;
    border: none;
}

/* 일정 카드 */
.todo {
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 작은 삭제 버튼 */
.delete {
    width: 25px;
    height: 25px;
    font-size: 12px;
    border-radius: 6px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- 왼쪽 -->
<div class="left">
    <div class="header">
        <span class="nav" onclick="changeMonth(-1)">‹</span>
        <span id="monthYear"></span>
        <span class="nav" onclick="changeMonth(1)">›</span>
    </div>

    <div id="calendar" class="calendar"></div>
</div>

<!-- 오른쪽 -->
<div class="right">
    <h1>💖 우리의 일정 💖</h1>

    <input type="date" id="date">
    <input type="time" id="time">
    <input type="text" id="task" placeholder="할 일을 입력하세요">
    <input type="color" id="color" value="#ff4d6d">

    <button onclick="addTodo()">추가</button>

    <div id="list"></div>
</div>

</div>

<script>
let todos = JSON.parse(localStorage.getItem("todos")) || [];
let currentDate = new Date();
let selectedDate = "";

// 저장
function save() {
    localStorage.setItem("todos", JSON.stringify(todos));
}

// 일정 추가
function addTodo() {
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;
    let task = document.getElementById("task").value;
    let color = document.getElementById("color").value;

    if (!date || !task) return alert("입력 필요");

    todos.push({ date, time, task, color });
    save();
    render();
    generateCalendar();
}

// 삭제
function deleteTodo(index) {
    todos.splice(index, 1);
    save();
    render();
    generateCalendar();
}

// 캘린더 생성
function generateCalendar() {
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();

    document.getElementById("monthYear").innerText =
        `${year}년 ${month + 1}월`;

    let firstDay = new Date(year, month, 1).getDay();
    let lastDate = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        cal.innerHTML += `<div></div>`;
    }

    for (let i = 1; i <= lastDate; i++) {
        let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

        let hasTodo = todos.some(t => t.date === dateStr);

        let day = document.createElement("div");
        day.className = "day";
        day.innerText = i;

        if (dateStr === selectedDate) day.classList.add("selected");

        day.onclick = () => {
            selectedDate = dateStr;
            render();
            generateCalendar();
        };

        if (hasTodo) {
            let dot = document.createElement("div");
            dot.className = "dot";
            day.appendChild(dot);
        }

        cal.appendChild(day);
    }
}

// 월 이동
function changeMonth(diff) {
    currentDate.setMonth(currentDate.getMonth() + diff);
    generateCalendar();
}

// 출력
function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let filtered = selectedDate
        ? todos.filter(t => t.date === selectedDate)
        : todos;

    filtered.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

    filtered.forEach((todo, i) => {
        list.innerHTML += `
            <div class="todo" style="background:${todo.color}">
                <span>${todo.time || ""} ${todo.task}</span>
                <button class="delete" onclick="deleteTodo(${i})">✕</button>
            </div>
        `;
    });
}

// 초기 실행
generateCalendar();
render();
</script>

</body>
</html>
